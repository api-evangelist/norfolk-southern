specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Norfolk Southern
providerId: norfolk-southern
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Freight
  - Logistics
  - Railroad
  - Shipping
  - Transportation
  - Rate Limiting
description: Norfolk Southern does not publish numeric rate limits for its ApiHub APIs. Limits are negotiated
  during customer onboarding and applied per API key. Sustained abuse is handled via account suspension
  rather than a documented per-second ceiling.
notes: Rate limit values are not publicly documented; consumers receive limits during onboarding. Update
  if Norfolk Southern publishes ceilings.
sources:
  - https://developer.nscorp.com/
responseCodes:
  unauthorized: 401
  forbidden: 403
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per API key
    scope: api-key
    metric: varies
    limit: not numerically published; negotiated during customer onboarding
    applies:
      - Norfolk Southern Shipment Status API
      - Norfolk Southern Trip Plan API
      - Norfolk Southern Gate Receipts API
policies:
  - name: Onboarding-issued credentials
    description: API keys are issued during customer onboarding via NS Customer Service / ApiHub registration
      and are scoped to the customer's accounts.
  - name: Backoff
    description: Implement exponential backoff with jitter on 429/503 responses; honor Retry-After when
      present.
  - name: Polling cadence
    description: For Shipment Status, prefer event-driven webhooks (where available) over high-frequency
      polling to stay well within fair use.
maintainers:
  - FN: API Evangelist
    url: https://apievangelist.com
    email: info@apievangelist.com
