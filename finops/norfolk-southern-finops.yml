specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Norfolk Southern
providerId: norfolk-southern
publisherName: Norfolk Southern Corporation
serviceCategory: Freight Rail / Logistics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Freight
  - Logistics
  - Railroad
  - Shipping
  - Transportation
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for Norfolk Southern: API access is bundled with the underlying freight-rail
  customer relationship and not invoiced separately. Cost dimensions are operational (integration build,
  shipment volume) rather than per-call.'
notes: Norfolk Southern does not invoice API consumers separately from their freight relationship.
sources:
  - https://developer.nscorp.com/
  - https://www.nscorp.com/site/customers/
principles:
  - name: Visibility
    description: NS does not bill per-call. Track per-API-key request volume and shipment status polling
      rates internally to ensure the integration scales with shipment volume.
  - name: Allocation
    description: Allocate integration cost (engineering time, monitoring) to the consuming logistics
      app or business unit. Tag NS API keys per-app for usage attribution.
  - name: Optimization
    description: Cache shipment status responses; use webhooks where available rather than polling. Batch
      Trip Plan and Gate Receipts queries by waybill rather than per-shipment to reduce request count.
  - name: Accountability
    description: Designate a logistics-IT owner for the NS ApiHub credential and integration health.
      Reconcile shipment-tracking data quality with NS Customer Service quarterly.
billingModel:
  pricingCategory: Bundled with Freight Relationship
  billingFrequency: None (bundled)
  billingCurrency: USD
  chargeCategories:
    - Usage
  chargeFrequency: None
focusColumns:
  ServiceName: Norfolk Southern ApiHub
  ServiceCategory: Freight Rail / Logistics
  ProviderName: Norfolk Southern
  PublisherName: Norfolk Southern Corporation
  InvoiceIssuerName: Norfolk Southern Corporation (freight invoice; API not separately billed)
  PricingCategory: Bundled
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Operationally tracked API request count per key (not invoiced)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - api_key
      - endpoint
  - name: shipment_status_polls
    description: Shipment Status polls (track to optimize polling cadence)
    unit: poll
    aggregation: sum
    dimensions:
      - shipment_id
  - name: trip_plan_lookups
    description: Trip Plan lookups
    unit: lookup
    aggregation: sum
  - name: gate_receipts_pulled
    description: Gate Receipts retrieved
    unit: receipt
    aggregation: sum
apis:
  - name: Norfolk Southern Shipment Status API
    baseURL: https://api.nscorp.com
    tags:
      - Freight
      - Railroad
      - Shipment
      - Tracking
    serviceName: Norfolk Southern Shipment Status API
    serviceCategory: Freight Rail
  - name: Norfolk Southern Trip Plan API
    baseURL: https://api.nscorp.com
    tags:
      - ETA
      - Railroad
      - Route
      - Trip Plan
    serviceName: Norfolk Southern Trip Plan API
    serviceCategory: Freight Rail
  - name: Norfolk Southern Gate Receipts API
    baseURL: https://api.nscorp.com
    tags:
      - Gate Receipts
      - Intermodal
      - Terminal
    serviceName: Norfolk Southern Gate Receipts API
    serviceCategory: Freight Rail
unitEconomics:
  - name: Polls per shipment
    metric: shipment_status_polls / active_shipments
    target: minimize via webhooks where available
  - name: Integration cost per shipment
    metric: integration_engineering_cost / shipments_tracked
    target: declining over time via reuse
maintainers:
  - FN: API Evangelist
    url: https://apievangelist.com
    email: info@apievangelist.com
