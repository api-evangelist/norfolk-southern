specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Norfolk Southern
providerId: norfolk-southern
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Freight
  - Logistics
  - Railroad
  - Shipping
  - Transportation
description: Norfolk Southern operates an API Resource Platform (ApiHub) that is gated to its existing
  freight customers and approved partners. Access is provisioned via developer.nscorp.com following customer
  onboarding rather than a self-serve sign-up. There is no public per-call pricing — API access is included
  in the freight relationship and not invoiced separately.
notes: developer.nscorp.com requires customer credentials and was not directly fetchable from outside
  the partner program. Update once Norfolk Southern publishes self-serve plan tiers.
sources:
  - https://developer.nscorp.com/
  - https://www.nscorp.com/site/customers/
plans:
  - id: norfolk-southern-customer-program
    name: NS ApiHub Customer Program
    type: enterprise
    description: API access bundled with a Norfolk Southern freight customer relationship. No separate
      per-call charge; provisioning gated by NS Customer Service onboarding.
    entries:
      - label: API access (no separate charge)
        name: customer_api_access
        type: subscription
        metric: contract
        limit: -1
        timeFrame: usage
        geo: US
        domains:
          - https://api.nscorp.com
        unit: 1
        price: included with freight relationship
        userMultiplied: false
    elements:
      - name: Norfolk Southern Shipment Status API
      - name: Norfolk Southern Trip Plan API
      - name: Norfolk Southern Gate Receipts API
      - name: ApiHub developer portal
      - name: OAuth / API key issued through customer onboarding
maintainers:
  - FN: API Evangelist
    url: https://apievangelist.com
    email: info@apievangelist.com
