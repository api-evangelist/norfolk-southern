name: Norfolk Southern
description: >-
  Norfolk Southern Corporation is one of the nation's premier transportation
  companies, operating approximately 19,300 route miles in 22 states and the
  District of Columbia. Norfolk Southern offers an API Resource Platform
  (ApiHub) providing real-time visibility into shipment status, trip plans,
  and gate receipts.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://github.com/api-evangelist/norfolk-southern/blob/main/apis.yml
created: '2025-03-01'
modified: '2025-03-01'
specificationVersion: '0.18'
tags:
  - Railroad
  - Transportation
  - Freight
  - Shipping
  - Logistics
apis:
  - name: Norfolk Southern Shipment Status API
    description: >-
      Pinpoint the current location and ETA for shipments and access details
      such as commodity, origin, and destination to proactively plan and staff
      delivery.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.nscorp.com/
    baseURL: https://api.nscorp.com
    tags:
      - Shipment
      - Tracking
      - Railroad
      - Freight
    properties:
      - type: Documentation
        url: https://developer.nscorp.com/
      - type: OpenAPI
        url: openapi/norfolk-southern-shipment-status-api.yml
  - name: Norfolk Southern Trip Plan API
    description: >-
      Track a shipment's progress on its planned route with its current ETA,
      future movements, and completed movements.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.nscorp.com/
    baseURL: https://api.nscorp.com
    tags:
      - Trip Plan
      - Route
      - ETA
      - Railroad
    properties:
      - type: Documentation
        url: https://developer.nscorp.com/
  - name: Norfolk Southern Gate Receipts API
    description: >-
      Access gate receipt data, terminal, and driver information, as well as
      the pickup numbers for equipment.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://developer.nscorp.com/
    baseURL: https://api.nscorp.com
    tags:
      - Gate Receipts
      - Terminal
      - Intermodal
    properties:
      - type: Documentation
        url: https://developer.nscorp.com/
